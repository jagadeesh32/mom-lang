name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Cuts a GitHub Release with signed tier-1 binaries when a v*.*.* tag
# is pushed. The release artifact naming matches `scripts/install.sh`.

jobs:
  binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: mom-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: mom-aarch64-linux
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            asset: mom-x86_64-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            asset: mom-aarch64-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: mom-x86_64-windows
            exe: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/mom${{ matrix.exe || '' }}" "$stage/"
          cp README.md LICENSE-APACHE 2>/dev/null "$stage/" || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            cd "$stage" && 7z a "${GITHUB_WORKSPACE}/${{ matrix.asset }}.zip" .
          else
            tar -czf "${{ matrix.asset }}.tar.gz" -C "$stage" .
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip

  publish:
    name: publish release
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          body_path: CHANGELOG.md
          fail_on_unmatched_files: false
