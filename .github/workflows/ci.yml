name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tier-1 matrix per docs/roadmap.md Phase 7:
#   Linux × {x86_64, aarch64}
#   macOS × {x86_64, aarch64}
#   Windows × {x86_64, aarch64}
#
# A green CI matrix here is the *acceptance criterion* for the "Tier-1
# platforms" row in the Phase 7 table. Tier-2 (WASM, RISC-V, Cortex-M)
# runs in a separate, best-effort workflow.

jobs:
  test:
    name: test (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: .exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            cross: true
            exe: .exe
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        if: ${{ !matrix.cross }}
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Install cross (ARM targets only)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --target ${{ matrix.target }} --release
          else
            cargo build --target ${{ matrix.target }} --release
          fi

      - name: Test
        if: ${{ !matrix.cross }}
        run: cargo test --target ${{ matrix.target }} --release

      - name: Run hello.mom under the freshly built compiler
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          ./target/${{ matrix.target }}/release/mom run examples/hello.mom

  selfhost:
    name: stage-1 selfhost parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: stage-1 selfhost regression
        run: cargo test --release --test selfhost

  stdlib:
    name: stdlib oracle sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: every std/*.mom matches its oracle
        run: cargo test --release --test stdlib

  tooling:
    name: phase 5 tooling acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --release --test tooling
